name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: meetscheduling-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check SSH reachability
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          host="${VPS_HOST:?VPS_HOST secret is required}"
          port="${VPS_PORT:-22}"

          python3 - "$host" "$port" <<'PY'
          import socket
          import sys

          host = sys.argv[1]
          port = int(sys.argv[2])
          errors = []

          for family, socktype, proto, _, sockaddr in socket.getaddrinfo(
              host,
              port,
              family=socket.AF_INET,
              type=socket.SOCK_STREAM,
          ):
              sock = socket.socket(family, socktype, proto)
              sock.settimeout(10)
              try:
                  sock.connect(sockaddr)
                  print(f"SSH reachability OK via IPv4: {sockaddr[0]}:{sockaddr[1]}")
                  sock.close()
                  break
              except OSError as exc:
                  errors.append(str(exc))
                  sock.close()
          else:
              joined = "; ".join(errors) if errors else "no IPv4 address resolved"
              raise SystemExit(
                  f"Unable to reach {host}:{port} over IPv4 from the GitHub runner: {joined}"
              )
          PY

      - name: Run production deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.VPS_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          protocol: tcp4
          timeout: 60s
          command_timeout: 30m
          script: |
            set -euo pipefail
            export DEPLOY_ENV=production
            export APP_DIR=/home/meetscheduling/htdocs/www.meetscheduling.com
            export PM2_APP_NAME=meetscheduling
            export BRANCH=main
            export HEALTHCHECK_URL=http://127.0.0.1:8080/api/health

            cd /home/meetscheduling/htdocs/www.meetscheduling.com
            bash scripts/deploy.sh

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          curl --fail --silent --show-error https://www.meetscheduling.com/api/health >/dev/null
