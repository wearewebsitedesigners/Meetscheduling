<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | MeetScheduling</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="shortcut icon" href="/assets/favicon.svg" />
  <meta name="color-scheme" content="light dark" />
  <script>
    document.documentElement.classList.add("auth-pending");
  </script>
  <style>
    html.auth-pending body {
      visibility: hidden;
      opacity: 0;
    }
  </style>
  <script>
    (() => {
      try {
        const previewHosts = new Set(["localhost", "127.0.0.1"]);
        const isPreview = previewHosts.has(window.location.hostname);
        if (!isPreview) return;

        window.__MEETSCHEDULING_LOCAL_PREVIEW__ = true;

        const previewStateKey = "meetscheduling_dashboard_preview_state_v1";
        const userKey = "meetscheduling_auth_user";
        const fallbackUser = {
          id: "preview-user",
          displayName: "Workspace User",
          username: "preview-user",
          email: "preview@meetscheduling.com",
          timezone: "UTC",
          avatarUrl: "",
        };

        let previewUser = fallbackUser;
        try {
          const raw = localStorage.getItem(previewStateKey);
          const parsed = raw ? JSON.parse(raw) : null;
          if (parsed && parsed.user) {
            previewUser = {
              ...fallbackUser,
              ...parsed.user,
            };
          }
        } catch {
          previewUser = fallbackUser;
        }

        localStorage.setItem(userKey, JSON.stringify(previewUser));
      } catch {
        // ignore preview bootstrap failures
      }
    })();
  </script>
  <script>
    (() => {
      const AUTH_USER_KEY = "meetscheduling_auth_user";
      const POST_LOGIN_REDIRECT_KEY = "meetscheduling_post_login_redirect";
      const LOGIN_PATH = "/login.html";

      const revealDashboard = () => {
        document.documentElement.classList.remove("auth-pending");
      };

      const clearStoredAuth = () => {
        try {
          localStorage.removeItem(AUTH_USER_KEY);
        } catch {
          // ignore
        }
      };

      const redirectToLogin = () => {
        try {
          const nextPath = `${window.location.pathname}${window.location.search}${window.location.hash || ""}`;
          sessionStorage.setItem(POST_LOGIN_REDIRECT_KEY, nextPath);
        } catch {
          // ignore
        }
        window.location.replace(LOGIN_PATH);
      };

      if (window.__MEETSCHEDULING_LOCAL_PREVIEW__) {
        revealDashboard();
        return;
      }

      fetch("/api/auth/me", {
        method: "GET",
        headers: {
          Accept: "application/json",
        },
        credentials: "same-origin",
        cache: "no-store",
      })
        .then(async (response) => {
          const payload = await response.json().catch(() => null);
          if (!response.ok || !payload?.user) {
            const error = new Error("Dashboard session validation failed.");
            error.status = response.status;
            throw error;
          }
          try {
            localStorage.setItem(AUTH_USER_KEY, JSON.stringify(payload.user));
          } catch {
            // ignore
          }
          revealDashboard();
        })
        .catch((error) => {
          if (Number(error?.status || 0) === 401) {
            clearStoredAuth();
          }
          redirectToLogin();
        });
    })();
  </script>
  <script>
    (() => {
      try {
        const key = "meetscheduling_react_theme_v1";
        const stored = localStorage.getItem(key);
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        const dark = stored ? stored === "dark" : prefersDark;
        document.documentElement.classList.toggle("dark", dark);
      } catch {
        // ignore
      }
    })();
  </script>
  <link rel="stylesheet" href="/assets/dashboard-react.css?v=20260313-calendarfix1" />
</head>

<body>
  <div id="dashboard-root"></div>
  <noscript>You need JavaScript enabled to use the MeetScheduling dashboard.</noscript>
  <script type="module" src="/assets/dashboard-react/dashboard-app.js?v=20260313-calendarfix1"></script>
</body>

</html>
